<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dompet — Monify</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/theme-init.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar__brand">
          <div class="sidebar__brand-icon">M</div>
          <span style="font-weight: 700">Monify</span>
        </div>
        <nav class="sidebar__nav" id="sidebar-nav"></nav>
      </aside>
      <div class="main">
        <header class="topbar"><span class="text-muted text-sm">Dompet</span></header>
        <div class="page">
          <h1 style="margin: 0; font-size: 1.5rem">Dompet</h1>
          <p class="text-muted text-sm mt-1">Daftar akun; saldo per dompet dan unggah logo ada di halaman rincian.</p>
          <a href="/wallets/assets" class="btn btn--primary mt-3" style="display: inline-block">Rincian aset &amp; saldo</a>

          <div class="card mt-4" style="max-width: 28rem">
            <strong>Tambah dompet</strong>
            <label class="text-sm text-muted mt-3" style="display: block">Nama</label>
            <input class="input mt-1" id="w-name" placeholder="BCA, ShopeePay, …" />
            <label class="text-sm text-muted mt-3" style="display: block">Saldo awal</label>
            <div class="ccy-field mt-1">
              <div class="ccy-dropdown ccy-dropdown--flags-only" id="w-ccy-root">
                <button type="button" class="ccy-dropdown__btn" id="w-ccy-btn" aria-expanded="false" aria-haspopup="listbox">
                  <span class="ccy-dropdown__flag" id="w-ccy-flag" aria-hidden="true">
                    <svg viewBox="0 0 24 16" xmlns="http://www.w3.org/2000/svg" width="24" height="16" role="img" aria-label="Indonesia">
                      <rect width="24" height="8" fill="#D7263D"></rect>
                      <rect y="8" width="24" height="8" fill="#FFFFFF"></rect>
                    </svg>
                  </span>
                  <span class="ccy-dropdown__label" id="w-ccy-label">Indonesia</span>
                  <span class="ccy-dropdown__caret" aria-hidden="true">▾</span>
                </button>
                <ul class="ccy-dropdown__menu" id="w-ccy-menu" role="listbox" hidden>
                  <li>
                    <button
                      type="button"
                      class="ccy-dropdown__option"
                      role="option"
                      data-currency="IDR"
                      data-flag="IDR"
                      data-label="Indonesia"
                    >
                      <span class="ccy-dropdown__flag" aria-hidden="true">
                        <svg viewBox="0 0 24 16" xmlns="http://www.w3.org/2000/svg" width="24" height="16" role="img" aria-label="Indonesia">
                          <rect width="24" height="8" fill="#D7263D"></rect>
                          <rect y="8" width="24" height="8" fill="#FFFFFF"></rect>
                        </svg>
                      </span>
                      <span>Indonesia</span>
                    </button>
                  </li>
                  <li>
                    <button
                      type="button"
                      class="ccy-dropdown__option"
                      role="option"
                      data-currency="USD"
                      data-flag="USD"
                      data-label="Amerika Serikat"
                    >
                      <span class="ccy-dropdown__flag" aria-hidden="true">
                        <svg viewBox="0 0 24 16" xmlns="http://www.w3.org/2000/svg" width="24" height="16" role="img" aria-label="Amerika Serikat">
                          <!-- Stripes -->
                          <rect x="0" y="0" width="24" height="1.230769" fill="#B22234"></rect>
                          <rect x="0" y="1.230769" width="24" height="1.230769" fill="#FFFFFF"></rect>
                          <rect x="0" y="2.461538" width="24" height="1.230769" fill="#B22234"></rect>
                          <rect x="0" y="3.692307" width="24" height="1.230769" fill="#FFFFFF"></rect>
                          <rect x="0" y="4.923076" width="24" height="1.230769" fill="#B22234"></rect>
                          <rect x="0" y="6.153845" width="24" height="1.230769" fill="#FFFFFF"></rect>
                          <rect x="0" y="7.384614" width="24" height="1.230769" fill="#B22234"></rect>
                          <rect x="0" y="8.615383" width="24" height="1.230769" fill="#FFFFFF"></rect>
                          <rect x="0" y="9.846152" width="24" height="1.230769" fill="#B22234"></rect>
                          <rect x="0" y="11.076921" width="24" height="1.230769" fill="#FFFFFF"></rect>
                          <rect x="0" y="12.30769" width="24" height="1.230769" fill="#B22234"></rect>
                          <rect x="0" y="13.538459" width="24" height="1.230769" fill="#FFFFFF"></rect>
                          <rect x="0" y="14.769228" width="24" height="1.230769" fill="#B22234"></rect>
                          <!-- Canton -->
                          <rect x="0" y="0" width="12" height="7.7" fill="#3C3B6E"></rect>
                          <!-- Simple stars -->
                          <circle cx="1.7" cy="1.6" r="0.35" fill="#FFFFFF"></circle>
                          <circle cx="4.2" cy="1.6" r="0.35" fill="#FFFFFF"></circle>
                          <circle cx="6.7" cy="1.6" r="0.35" fill="#FFFFFF"></circle>
                          <circle cx="9.2" cy="1.6" r="0.35" fill="#FFFFFF"></circle>
                          <circle cx="2.2" cy="3.2" r="0.35" fill="#FFFFFF"></circle>
                          <circle cx="4.7" cy="3.2" r="0.35" fill="#FFFFFF"></circle>
                          <circle cx="7.2" cy="3.2" r="0.35" fill="#FFFFFF"></circle>
                          <circle cx="9.7" cy="3.2" r="0.35" fill="#FFFFFF"></circle>
                          <circle cx="1.7" cy="4.8" r="0.35" fill="#FFFFFF"></circle>
                          <circle cx="4.2" cy="4.8" r="0.35" fill="#FFFFFF"></circle>
                          <circle cx="6.7" cy="4.8" r="0.35" fill="#FFFFFF"></circle>
                          <circle cx="9.2" cy="4.8" r="0.35" fill="#FFFFFF"></circle>
                        </svg>
                      </span>
                      <span>Amerika Serikat</span>
                    </button>
                  </li>
                </ul>
              </div>
              <input class="input ccy-field__amount" id="w-balance" inputmode="numeric" placeholder="0" />
              <input type="hidden" id="w-currency" value="IDR" />
            </div>
            <label class="text-sm text-muted mt-3" style="display: block">Logo (opsional)</label>
            <div class="wallet-logo-row mt-2">
              <input type="file" id="w-logo-file" accept="image/*" class="visually-hidden" tabindex="-1" />
              <button type="button" class="btn btn--outline" id="w-logo-file-btn">Pilih gambar</button>
              <span class="text-muted text-sm" id="w-logo-file-name"></span>
            </div>
            <button type="button" class="btn btn--primary mt-4" id="w-add">Simpan dompet</button>
            <div id="w-err" class="alert alert--error mt-3" style="display: none"></div>
          </div>

          <div class="wallet-grid mt-4" id="wallet-grid"></div>
        </div>
      </div>
    </div>
    <nav class="mobile-nav" id="mobile-nav"></nav>
    <script src="/js/api.js"></script>
    <script src="/js/format.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/wallets.js"></script>
  </body>
</html>
