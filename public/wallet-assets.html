<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monify</title>
    <link rel="icon" href="/assets/logo/logo.png" type="image/jpeg" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/theme-init.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar__brand">
          <img class="sidebar__brand-icon" src="/assets/logo/logo.png" alt="Monify" />
          <span style="font-weight: 700; font-size: 1rem">Monify</span>
        </div>
        <nav class="sidebar__nav" id="sidebar-nav"></nav>
      </aside>
      <div class="main">
        <header class="topbar flex-between">
          <a href="/wallets" class="btn-back" title="Kembali ke Dompet">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          </a>
        </header>
        <div class="page" style="max-width: 64rem">
          <h1 style="margin: 0; font-size: 1.5rem">Rincian aset &amp; saldo</h1>
          <p class="text-muted text-sm mt-1">Distribusi aset, saldo per dompet, dan penyesuaian logo khusus.</p>
          <div id="assets-err" class="alert alert--error mt-3" style="display: none"></div>
          
          <div class="mt-4" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; align-items: start;">
            <div id="assets-viz"></div>
            <div id="assets-root" style="display: flex; flex-direction: column; gap: 1rem"></div>
          </div>
        </div>
      </div>
    </div>
    <nav class="mobile-nav" id="mobile-nav"></nav>
    <script src="/js/api.js"></script>
    <script src="/js/format.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/wallet-assets.js"></script>
  </body>
</html>
