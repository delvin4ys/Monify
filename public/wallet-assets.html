<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aset per dompet — Monify</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/theme-init.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar__brand">
          <div class="sidebar__brand-icon">M</div>
          <span style="font-weight: 700">Monify</span>
        </div>
        <nav class="sidebar__nav" id="sidebar-nav"></nav>
      </aside>
      <div class="main">
        <header class="topbar flex-between">
          <a href="/wallets" class="text-sm">← Dompet</a>
        </header>
        <div class="page" style="max-width: 42rem">
          <h1 style="margin: 0; font-size: 1.5rem">Rincian aset</h1>
          <p class="text-muted text-sm mt-1">Saldo per dompet dan logo kustom (unggah gambar).</p>
          <div id="assets-err" class="alert alert--error mt-3" style="display: none"></div>
          <div id="assets-root" class="mt-4" style="display: grid; gap: 1rem"></div>
        </div>
      </div>
    </div>
    <nav class="mobile-nav" id="mobile-nav"></nav>
    <script src="/js/api.js"></script>
    <script src="/js/format.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/wallet-assets.js"></script>
  </body>
</html>
