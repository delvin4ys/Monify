<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monify</title>
    <link rel="icon" href="/assets/logo/logo.png" type="image/jpeg" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/theme-init.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar__brand">
          <img class="sidebar__brand-icon" src="/assets/logo/logo.png" alt="Monify" />
          <span style="font-weight: 700; font-size: 1rem">Monify</span>
        </div>
        <nav class="sidebar__nav" id="sidebar-nav"></nav>
      </aside>
      <div class="main">
        <header class="topbar flex-between">
          <a href="/settings" class="btn-back" title="Kembali ke Pengaturan">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          </a>
        </header>
        <div class="page" style="max-width: 32rem">
          <h1 style="margin: 0; font-size: 1.35rem">Mata uang utama</h1>
          <p class="text-muted text-sm mt-1">Ringkasan dashboard, transaksi, dan laporan memakai mata uang ini.</p>
          <div class="card mt-4">
            <div class="mt-3" style="display: flex; gap: 0.5rem; flex-wrap: wrap">
              <button type="button" class="btn btn--outline" id="btn-ccy-idr">🇮🇩 Rupiah (IDR)</button>
              <button type="button" class="btn btn--outline" id="btn-ccy-usd">🇺🇸 Dolar (USD)</button>
            </div>
            <p class="text-muted text-sm mt-3 mb-0" id="ccy-status">—</p>
          </div>
        </div>
      </div>
    </div>
    <nav class="mobile-nav" id="mobile-nav"></nav>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/settings-currency.js"></script>
  </body>
</html>
