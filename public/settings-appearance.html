<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tampilan — Monify</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/theme-init.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar__brand">
          <div class="sidebar__brand-icon">M</div>
          <span style="font-weight: 700">Monify</span>
        </div>
        <nav class="sidebar__nav" id="sidebar-nav"></nav>
      </aside>
      <div class="main">
        <header class="topbar flex-between">
          <a href="/settings" class="btn-back" title="Kembali ke Pengaturan">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          </a>
        </header>
        <div class="page" style="max-width: 32rem">
          <h1 style="margin: 0; font-size: 1.35rem">Tampilan</h1>
          <p class="text-muted text-sm mt-1">Preferensi disimpan di perangkat ini.</p>
          <div class="card mt-4">
            <button type="button" class="btn btn--outline" id="btn-theme-toggle">Mode gelap: mati</button>
          </div>
        </div>
      </div>
    </div>
    <nav class="mobile-nav" id="mobile-nav"></nav>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/settings-appearance.js"></script>
  </body>
</html>
