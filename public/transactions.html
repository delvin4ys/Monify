<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Transaksi — Monify</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/theme-init.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar__brand">
          <div class="sidebar__brand-icon">M</div>
          <span style="font-weight: 700">Monify</span>
        </div>
        <nav class="sidebar__nav" id="sidebar-nav"></nav>
      </aside>
      <div class="main">
        <header class="topbar"><span class="text-muted text-sm">Transaksi</span></header>
        <div class="page">
          <div class="flex-between" style="flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem">
            <div>
              <h1 style="margin: 0; font-size: 1.5rem">Transaksi</h1>
              <p class="text-muted text-sm mt-1">Filter per bulan, saldo per dompet, dan pencarian.</p>
            </div>
            <a href="/transactions/new" class="btn btn--primary">+ Transaksi</a>
          </div>

          <div class="month-scroll-wrap">
            <div class="month-scroll" id="month-strip"></div>
          </div>

          <div class="balance-scroll-wrap mt-4">
            <div class="balance-scroll" id="balance-row"></div>
          </div>

          <input type="search" class="input mt-4" id="search" placeholder="Cari judul, kategori, pihak, terkait…" style="max-width: 28rem" />

          <div class="table-wrap mt-4" id="tx-table-wrap">
            <table class="data">
              <thead>
                <tr>
                  <th>Aktivitas</th>
                  <th>Tanggal</th>
                  <th style="text-align: right">Jumlah</th>
                  <th>Status</th>
                  <th style="width: 7rem">Aksi</th>
                </tr>
              </thead>
              <tbody id="tx-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <nav class="mobile-nav" id="mobile-nav"></nav>
    <script src="/js/api.js"></script>
    <script src="/js/format.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/transactions.js"></script>
  </body>
</html>
