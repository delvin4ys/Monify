<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monify</title>
    <link rel="icon" href="/assets/logo/logo.png" type="image/jpeg" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/theme-init.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar__brand">
          <img class="sidebar__brand-icon" src="/assets/logo/logo.png" alt="Monify" />
          <span style="font-weight: 700; font-size: 1rem">Monify</span>
        </div>
        <nav class="sidebar__nav" id="sidebar-nav"></nav>
      </aside>
      <div class="main">
        <header class="topbar flex-between">
          <a href="/transactions" class="btn-back" title="Kembali ke daftar">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          </a>
          <span class="text-muted text-sm">Transaksi baru</span>
        </header>
        <div class="page tx-new-page">
          <h1 style="margin: 0 0 0.5rem; font-size: 1.5rem">Catat transaksi</h1>
          <p class="text-muted text-sm">Pilih jenis, dompet, kategori, dan jumlah.</p>

          <div id="form-err" class="alert alert--error mt-4" style="display: none"></div>

          <div class="tx-type-tabs mt-4" id="tx-kind-tabs">
            <button type="button" class="btn btn--primary" data-kind="expense">Pengeluaran</button>
            <button type="button" class="btn btn--outline" data-kind="income">Pemasukan</button>
            <button type="button" class="btn btn--outline" data-kind="debt">Hutang / Pinjaman</button>
          </div>

          <div class="card mt-4" style="max-width: 32rem">
            <label class="text-sm text-muted" style="display: block">Dompet</label>
            <select class="input mt-1" id="f-wallet"></select>

            <label class="text-sm text-muted mt-4" style="display: block">Nominal</label>
            <div class="mt-2">
              <input class="input" type="text" id="f-amount" inputmode="numeric" placeholder="0" autocomplete="off" />
            </div>
            <p class="text-muted text-sm mt-1" id="f-amount-hint">Mata uang transaksi mengikuti pengaturan utama Anda.</p>

            <label class="text-sm text-muted mt-4" style="display: block">Status</label>
            <select class="input mt-1" id="f-status">
              <option value="success">Berhasil (transaksi sudah menarik/mengubah saldo)</option>
              <option value="pending">Pending (transaksi belum menarik uang secara sempurna)</option>
            </select>

            <label class="text-sm text-muted mt-4" style="display: block">Kategori</label>
            <input type="hidden" id="f-cat" value="" />
            <div class="mt-2" id="cat-pick-row">
              <div class="tx-cat-pill is-empty" id="cat-pill">
                <span class="tx-cat-pill__icon" id="cat-pill-icon">🏷️</span>
                <span class="tx-cat-pill__text" id="cat-label">Belum dipilih</span>
              </div>
            </div>
            <a href="#" class="btn btn--outline mt-2" id="cat-pick-link" style="display: inline-block">Pilih kategori</a>

            <label class="text-sm text-muted mt-4" style="display: block">Nama / catatan</label>
            <input class="input mt-1" type="text" id="f-title" placeholder="Contoh: Makan siang, bayar listrik…" />

            <label class="text-sm text-muted mt-4" style="display: block">Tanggal transaksi</label>
            <input class="input mt-1" type="date" id="f-date" />

            <div id="debt-extra" style="display: none">
              <label class="text-sm text-muted mt-4" style="display: block">Pihak (peminjam / pemberi pinjaman)</label>
              <input class="input mt-1" type="text" id="f-counterparty" placeholder="Nama orang atau lembaga" />
            </div>

            <div id="related-party-extra">
              <label class="text-sm text-muted mt-4" style="display: block">Pihak berkaitan (opsional)</label>
              <input class="input mt-1" type="text" id="f-related" placeholder="Nama orang/pihak yang berkaitan" />
            </div>

            <div class="mt-4">
              <label class="text-sm text-muted" style="display: block">Lampiran (opsional)</label>
              <div class="tx-attach-row mt-2">
                <input type="file" id="f-file" accept="image/*" class="visually-hidden" tabindex="-1" />
                <button type="button" class="tx-attach-btn" id="f-file-trigger" title="Tambah gambar" aria-label="Tambah gambar">
                  <svg class="tx-attach-btn__svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" />
                  </svg>
                  <span class="tx-attach-btn__text">Lampiran</span>
                </button>
                <span class="text-muted text-sm" id="f-file-name"></span>
              </div>
            </div>

            <div class="mt-6" style="display: flex; gap: 0.75rem">
              <a href="/transactions" class="btn btn--outline" style="flex: 1; text-align: center">Batal</a>
              <button type="button" class="btn btn--primary" style="flex: 1" id="f-save">Simpan</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <nav class="mobile-nav" id="mobile-nav"></nav>
    <script src="/js/api.js"></script>
    <script src="/js/format.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/transaction-new.js"></script>
  </body>
</html>
