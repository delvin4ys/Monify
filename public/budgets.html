<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Monify</title>
  <link rel="icon" href="/assets/logo/logo.png" type="image/jpeg" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="/js/theme-init.js"></script>
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar__brand">
        <img class="sidebar__brand-icon" src="/assets/logo/logo.png" alt="Monify" />
        <span style="font-weight: 700; font-size: 1rem">Monify</span>
      </div>
      <nav class="sidebar__nav" id="sidebar-nav"></nav>
    </aside>
    <div class="main">
      <header class="topbar"><span class="text-muted text-sm">Budget</span></header>
      <div class="page">
        <div class="flex-between" style="flex-wrap: wrap; gap: 1rem; align-items: center">
          <div>
            <h1 style="margin: 0; font-size: 1.5rem">Budget</h1>
            <p class="text-muted text-sm mt-1">
              Anggaran dihitung dalam <strong>IDR</strong> (sama dengan nilai transaksi pengeluaran). Bulanan atau
              rentang kustom.
            </p>
          </div>
          <div style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap">
            <label class="text-sm text-muted">Lihat bulan</label>
            <input type="month" class="input" id="view-month" style="width: auto; min-width: 10rem" />
            <button type="button" class="btn btn--primary" id="btn-open-budget">+ Buat anggaran</button>
          </div>
        </div>

        <div class="card mt-4" id="budget-summary-card" style="display: none">
          <div class="gauge-wrap">
            <div class="gauge">
              <svg class="gauge__svg" viewBox="0 0 200 120">
                <path class="gauge__track" d="M20,100 A80,80 0 0,1 180,100" />
                <path class="gauge__fill" id="gauge-fill" d="M20,100 A80,80 0 0,1 180,100" />
                <circle class="gauge__dot" id="gauge-dot" cx="20" cy="100" r="6" />
              </svg>
              <div class="gauge__center">
                <span class="text-muted" style="font-size:0.8rem">Sisa anggaran</span>
                <strong class="gauge__value" id="sum-remain">—</strong>
                <span class="text-muted" style="font-size:0.8rem">~<span id="sum-daily">—</span>/hari</span>
              </div>
            </div>
            <div class="gauge__stats">
              <div class="gauge__stat">
                <strong id="sum-limit">—</strong>
                <span>Total alokasi</span>
              </div>
              <div class="gauge__stat">
                <strong id="sum-spent">—</strong>
                <span>Total terpakai</span>
              </div>
              <div class="gauge__stat">
                <strong id="sum-days-left">—</strong>
                <span>Sisa hari</span>
              </div>
            </div>
          </div>
        </div>

        <div id="budget-list" class="mt-4"
          style="display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr))"></div>
      </div>
    </div>
  </div>
  <nav class="mobile-nav" id="mobile-nav"></nav>

  <div id="modal-budget" class="modal-overlay" aria-hidden="true" role="presentation">
    <div class="modal" style="max-width: 22rem" role="dialog" aria-modal="true" aria-labelledby="budget-modal-title">
      <h2 id="budget-modal-title" style="margin-top: 0">Budget baru</h2>
      <div id="budget-err" class="alert alert--error" style="display: none"></div>
      <label class="text-sm text-muted">Target</label>
      <select class="input mt-1" id="b-target-kind">
        <option value="CATEGORY">Kategori</option>
        <option value="PARENT">Induk kategori</option>
      </select>
      <label class="text-sm text-muted mt-3" style="display: block">Pilih Target</label>
      <button type="button" class="input mt-1" id="btn-select-target" style="text-align: left; display: flex; justify-content: space-between; align-items: center; background: #f8fafc;">
        <span id="target-display">Pilih kategori atau induk...</span>
        <span style="font-size: 0.8rem; opacity: 0.5;">➔</span>
      </button>
      <input type="hidden" id="b-target-id" />
      <label class="text-sm text-muted mt-3" style="display: block">Periode</label>
      <select class="input mt-1" id="b-period-mode">
        <option value="" disabled selected>— Pilih periode —</option>
        <option value="monthly">1 bulan penuh</option>
        <option value="custom">Rentang tanggal kustom</option>
      </select>
      <div id="b-month-hint" class="text-sm mt-2" style="color: var(--brand); opacity: 0.7; font-style: italic;">Memakai bulan dari &quot;Lihat bulan&quot; di atas.</div>
      <div id="b-range-wrap" style="display: none">
        <label class="text-sm text-muted mt-3" style="display: block">Mulai</label>
        <input class="input mt-1" type="date" id="b-p-start" />
        <label class="text-sm text-muted mt-3" style="display: block">Selesai</label>
        <input class="input mt-1" type="date" id="b-p-end" />
      </div>
      <label class="text-sm text-muted mt-3" style="display: block">Limit (IDR)</label>
      <input class="input mt-1" type="text" id="b-limit" inputmode="numeric" placeholder="0" />
      <div style="display: flex; gap: 0.75rem; margin-top: 1.25rem">
        <button type="button" class="btn btn--outline" style="flex: 1" id="b-cancel">Batal</button>
        <button type="button" class="btn btn--primary" style="flex: 1" id="b-save">Simpan</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/format.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/budgets.js?v=5"></script>
</body>

</html>
