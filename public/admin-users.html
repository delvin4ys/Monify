<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin — Monify</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/theme-init.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar__brand">
          <div class="sidebar__brand-icon">M</div>
          <span style="font-weight: 700">Monify</span>
        </div>
        <nav class="sidebar__nav" id="sidebar-nav"></nav>
      </aside>
      <div class="main">
        <header class="topbar"><span class="text-muted text-sm">Admin</span></header>
        <div class="page">
          <div class="flex-between" style="flex-wrap: wrap; gap: 1rem">
            <div>
              <h1 style="margin: 0; font-size: 1.5rem">Pengguna terdaftar</h1>
              <p class="text-muted text-sm mt-1">Data dari database Anda.</p>
            </div>
            <a href="/settings" class="text-sm">← Pengaturan</a>
          </div>
          <div id="err" class="alert alert--error mt-4" style="display: none"></div>
          <div class="table-wrap mt-4">
            <table class="data">
              <thead>
                <tr>
                  <th>Email</th>
                  <th>Nama</th>
                  <th>Terdaftar</th>
                  <th style="text-align: right">Dompet</th>
                  <th style="text-align: right">Kategori</th>
                  <th style="text-align: right">Tx</th>
                </tr>
              </thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <nav class="mobile-nav" id="mobile-nav"></nav>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/admin-users.js"></script>
  </body>
</html>
