<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Monify</title>
  <link rel="icon" href="/assets/logo/logo.png" type="image/jpeg" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="/js/theme-init.js"></script>
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar__brand">
        <img class="sidebar__brand-icon" src="/assets/logo/logo.png" alt="Monify" />
        <span style="font-weight: 700; font-size: 1rem">Monify</span>
      </div>
      <nav class="sidebar__nav" id="sidebar-nav"></nav>
    </aside>
    <div class="main">
      <header class="topbar"><span class="text-muted text-sm">Transaksi</span></header>
      <div class="page">
        <div class="flex-between" style="flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem; align-items: center">
          <div>
            <h1 style="margin: 0; font-size: 1.5rem">Transaksi</h1>
            <p class="text-muted text-sm mt-1">Temukan dan kelola semua transaksimu di sini.</p>
          </div>
          <a href="/transactions/new" class="btn btn--primary">+ Transaksi</a>
        </div>

        <div class="month-scroll-wrap">
          <div class="month-scroll" id="month-strip"></div>
        </div>



        <div class="mt-4" style="position: relative; max-width: 28rem;">
          <svg
            style="position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--text-muted)"
            width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="search" class="input" id="search" placeholder="Cari judul, kategori, pihak, terkait…"
            style="padding-left: 2.75rem; width: 100%;" />
        </div>

        <div class="table-wrap mt-4" id="tx-table-wrap">
          <table class="data">
            <thead>
              <tr>
                <th>Aktivitas</th>
                <th>Kategori</th>
                <th>Wallet</th>
                <th>Tanggal</th>
                <th style="text-align: right">Jumlah</th>
                <th>Status</th>
                <th style="width: 7rem; text-align: center">Aksi</th>
              </tr>
            </thead>
            <tbody id="tx-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Payment modal -->
  <div class="payment-overlay" id="payment-overlay">
    <div class="payment-modal">
      <h3 id="pay-modal-title">Bayar Hutang</h3>
      <div id="pay-err" class="alert alert--error" style="display: none"></div>

      <label class="text-sm text-muted" style="display: block">Jumlah pembayaran</label>
      <input class="input mt-1" type="text" id="pay-amount" inputmode="numeric" placeholder="Rp 0" autocomplete="off" />
      <p class="text-muted text-sm mt-1" id="pay-remaining-hint"></p>

      <label class="text-sm text-muted mt-4" style="display: block">Tanggal pembayaran</label>
      <input class="input mt-1" type="date" id="pay-date" />

      <label class="text-sm text-muted mt-4" style="display: block">Dompet</label>
      <select class="input mt-1" id="pay-wallet"></select>

      <input type="hidden" id="pay-tx-id" />

      <div class="mt-4" style="display: flex; gap: 0.75rem">
        <button type="button" class="btn btn--outline" style="flex: 1" id="pay-cancel">Batal</button>
        <button type="button" class="btn btn--primary" style="flex: 1" id="pay-save">Bayar</button>
      </div>
    </div>
  </div>

  <nav class="mobile-nav" id="mobile-nav"></nav>
  <script src="/js/api.js"></script>
  <script src="/js/format.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/transactions.js"></script>
</body>

</html>
