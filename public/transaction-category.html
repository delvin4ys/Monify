<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monify</title>
    <link rel="icon" href="/assets/logo/logo.png" type="image/jpeg" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/theme-init.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar__brand">
          <img class="sidebar__brand-icon" src="/assets/logo/logo.png" alt="Monify" />
          <span style="font-weight: 700; font-size: 1rem">Monify</span>
        </div>
        <nav class="sidebar__nav" id="sidebar-nav"></nav>
      </aside>
      <div class="main">
        <header class="topbar flex-between">
          <a href="#" class="btn-back" id="cat-back" title="Kembali">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          </a>
          <span class="text-muted text-sm">Pilih kategori</span>
        </header>
        <div class="page" style="padding-bottom: 4rem">
          <h1 style="margin: 0; font-size: 1.35rem">Kategori</h1>
          <p class="text-muted text-sm mt-1" id="cat-kind-hint">—</p>
          <div id="cat-tree" class="cat-tree mt-4"></div>
        </div>
      </div>
    </div>
    <nav class="mobile-nav" id="mobile-nav"></nav>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/transaction-category.js"></script>
  </body>
</html>
